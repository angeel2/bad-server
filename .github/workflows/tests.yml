name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
env:
  DIR_TESTS: /tmp/tests-bad-server
  REP_TESTS: https://github.com/Yandex-Practicum/tests-bad-server.git
  REPO: ${{ github.event.repository.name }}
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Set up GitHub Actions
      uses: actions/checkout@v4
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
    - name: Get testing lib
      run: set -eu && git clone --depth 1 $REP_TESTS $DIR_TESTS
    - name: Start project
      run: bash $DIR_TESTS/bin/start_project.sh
    - name: Import MongoDB data
      run: |
        docker exec -i bad-server-mongo-1 mongoimport --username root --password example --authenticationDatabase admin --db weblarek --collection users --drop --jsonArray --file /dev/stdin < .dump/weblarek.users.json
        docker exec -i bad-server-mongo-1 mongoimport --username root --password example --authenticationDatabase admin --db weblarek --collection products --drop --jsonArray --file /dev/stdin < .dump/weblarek.products.json
    - name: Run tests
      run: bash $DIR_TESTS/bin/run.sh